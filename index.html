<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JPPF Business Manager</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,400;0,500;0,600;0,700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
/* ============================================================
   JPPF BUSINESS MANAGER — Stylesheet
   ============================================================ */
:root {
  --bg: #0d0d0d;
  --bg2: #161616;
  --bg3: #1e1e1e;
  --bg4: #282828;
  --fg: #e8e4dd;
  --fg2: #a09b93;
  --fg3: #6b6760;
  --accent: #c9a227;
  --accent2: #e6be3f;
  --accent-dim: rgba(201,162,39,0.12);
  --green: #3a9e6e;
  --green-bg: rgba(58,158,110,0.12);
  --green-fg: #5cc98d;
  --red: #c94444;
  --red-bg: rgba(201,68,68,0.1);
  --red-fg: #e87070;
  --yellow: #c9a227;
  --yellow-bg: rgba(201,162,39,0.1);
  --yellow-fg: #e6be3f;
  --blue: #4488cc;
  --blue-bg: rgba(68,136,204,0.1);
  --blue-fg: #6ab0f0;
  --purple: #8866bb;
  --purple-bg: rgba(136,102,187,0.1);
  --purple-fg: #aa88dd;
  --border: rgba(255,255,255,0.06);
  --border2: rgba(255,255,255,0.1);
  --radius: 8px;
  --radius-lg: 12px;
  --font: 'DM Sans', -apple-system, sans-serif;
  --mono: 'DM Mono', monospace;
  --shadow: 0 2px 12px rgba(0,0,0,0.4);
}

* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { height: 100%; }
body {
  font-family: var(--font);
  background: var(--bg);
  color: var(--fg);
  font-size: 14px;
  line-height: 1.5;
  overflow: hidden;
}

/* ---- LAYOUT ---- */
.app { display: flex; height: 100vh; }
.sidebar {
  width: 220px; min-width: 220px;
  background: var(--bg);
  border-right: 1px solid var(--border);
  display: flex; flex-direction: column;
  padding: 20px 0;
}
.sidebar-brand {
  padding: 0 20px 24px;
  border-bottom: 1px solid var(--border);
  margin-bottom: 8px;
}
.sidebar-brand h1 {
  font-size: 15px; font-weight: 700; letter-spacing: 1px;
  color: var(--accent);
}
.sidebar-brand p {
  font-size: 11px; color: var(--fg3); margin-top: 2px;
  font-family: var(--mono);
}
.nav-item {
  display: flex; align-items: center; gap: 10px;
  padding: 10px 20px; cursor: pointer;
  color: var(--fg2); font-size: 13px; font-weight: 500;
  border: none; background: none; width: 100%; text-align: left;
  transition: all 0.15s;
}
.nav-item:hover { background: var(--bg2); color: var(--fg); }
.nav-item.active { background: var(--accent-dim); color: var(--accent); }
.nav-item svg { width: 18px; height: 18px; opacity: 0.7; }
.nav-item.active svg { opacity: 1; }
.nav-spacer { flex: 1; }
.nav-badge {
  font-size: 10px; font-weight: 700;
  background: var(--red); color: #fff;
  border-radius: 10px; padding: 2px 7px;
  margin-left: auto;
}

.main { flex: 1; overflow-y: auto; overflow-x: hidden; padding: 28px 32px; min-width: 0; }
.main::-webkit-scrollbar { width: 6px; }
.main::-webkit-scrollbar-thumb { background: var(--bg4); border-radius: 3px; }

/* ---- HEADER ---- */
.page-header {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 24px;
}
.page-header h2 {
  font-size: 22px; font-weight: 700; color: var(--fg);
}
.page-header-actions { display: flex; gap: 8px; }

/* ---- BUTTONS ---- */
.btn {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 8px 16px; border-radius: var(--radius);
  font-family: var(--font); font-size: 13px; font-weight: 600;
  cursor: pointer; border: 1px solid var(--border2);
  background: var(--bg3); color: var(--fg);
  transition: all 0.15s;
}
.btn:hover { background: var(--bg4); border-color: var(--fg3); }
.btn-accent {
  background: var(--accent); color: var(--bg); border-color: var(--accent);
}
.btn-accent:hover { background: var(--accent2); }
.btn-sm { padding: 5px 10px; font-size: 12px; }
.btn-danger { background: var(--red-bg); color: var(--red-fg); border-color: rgba(201,68,68,0.2); }
.btn-danger:hover { background: rgba(201,68,68,0.2); }
.btn-ghost { background: none; border-color: transparent; }
.btn-ghost:hover { background: var(--bg3); }

/* ---- METRICS ---- */
.metrics { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 12px; margin-bottom: 24px; }
.metric-card {
  background: var(--bg2); border: 1px solid var(--border);
  border-radius: var(--radius-lg); padding: 16px;
}
.metric-label { font-size: 11px; color: var(--fg3); text-transform: uppercase; letter-spacing: 0.5px; font-weight: 600; }
.metric-value { font-size: 24px; font-weight: 700; margin-top: 4px; font-family: var(--mono); }
.metric-sub { font-size: 11px; color: var(--fg3); margin-top: 2px; }

/* ---- FILTERS ---- */
.filters { display: flex; gap: 6px; margin-bottom: 16px; flex-wrap: wrap; align-items: center; }
.filter-chip {
  padding: 5px 12px; border-radius: 20px; font-size: 12px; font-weight: 500;
  cursor: pointer; border: 1px solid var(--border2);
  background: var(--bg2); color: var(--fg2);
  transition: all 0.15s;
}
.filter-chip:hover { border-color: var(--fg3); color: var(--fg); }
.filter-chip.active { background: var(--accent-dim); color: var(--accent); border-color: rgba(201,162,39,0.3); }
.filter-chip.danger { background: var(--red-bg); color: var(--red-fg); border-color: rgba(201,68,68,0.2); }

/* ---- TABLE ---- */
.table-wrap {
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  overflow: hidden;
}
.table-scroll { overflow-x: auto; }
table { width: 100%; border-collapse: collapse; min-width: 800px; }
th {
  text-align: left; padding: 10px 14px;
  font-size: 11px; font-weight: 600; color: var(--fg3);
  text-transform: uppercase; letter-spacing: 0.5px;
  background: var(--bg2); border-bottom: 1px solid var(--border);
  white-space: nowrap; position: sticky; top: 0; z-index: 1;
}
td {
  padding: 10px 14px; border-bottom: 1px solid var(--border);
  vertical-align: middle; font-size: 13px;
}
tr:last-child td { border-bottom: none; }
tr.clickable { cursor: pointer; transition: background 0.1s; }
tr.clickable:hover { background: var(--bg2); }
tr.section-row td {
  background: var(--bg3); font-size: 12px; font-weight: 700;
  color: var(--accent); letter-spacing: 0.5px; padding: 8px 14px;
}

/* ---- BADGES ---- */
.badge {
  display: inline-block; padding: 3px 10px; border-radius: 20px;
  font-size: 11px; font-weight: 600; white-space: nowrap;
}
.badge-paid { background: var(--green-bg); color: var(--green-fg); }
.badge-partial, .badge-deposit { background: var(--yellow-bg); color: var(--yellow-fg); }
.badge-unpaid { background: var(--red-bg); color: var(--red-fg); }
.badge-taxable { background: var(--blue-bg); color: var(--blue-fg); }
.badge-nonprofit { background: var(--purple-bg); color: var(--purple-fg); }
.badge-unknown { background: var(--bg4); color: var(--fg3); }
.badge-draft { background: var(--bg4); color: var(--fg3); }
.badge-sent { background: var(--blue-bg); color: var(--blue-fg); }
.badge-signed { background: var(--green-bg); color: var(--green-fg); }
.badge-complete { background: var(--green-bg); color: var(--green-fg); }
.badge-lead { background: var(--bg4); color: var(--fg3); }

/* ---- PIPELINE ---- */
.pipeline { display: flex; align-items: center; gap: 3px; }
.pip { width: 20px; height: 6px; border-radius: 3px; background: var(--bg4); cursor: pointer; transition: transform 0.1s, opacity 0.1s; }
.pip:hover { transform: scaleY(1.8); opacity: 0.8; }
.pip.done { background: var(--green); }
.pip.current { background: var(--yellow); }
.pip.na { background: var(--purple); }
.pip-label { font-size: 10px; color: var(--fg3); margin-left: 6px; white-space: nowrap; cursor: pointer; }
.pip-label:hover { color: var(--accent); }

/* ---- MONEY ---- */
.money { font-family: var(--mono); white-space: nowrap; font-size: 13px; }

/* ---- FORMS ---- */
.form-group { margin-bottom: 16px; }
.form-label {
  display: block; font-size: 12px; font-weight: 600;
  color: var(--fg2); margin-bottom: 6px; text-transform: uppercase;
  letter-spacing: 0.5px;
}
.form-input, .form-select, .form-textarea {
  width: 100%; padding: 9px 12px;
  background: var(--bg2); border: 1px solid var(--border2);
  border-radius: var(--radius); color: var(--fg);
  font-family: var(--font); font-size: 13px;
  transition: border-color 0.15s;
}
.form-input:focus, .form-select:focus, .form-textarea:focus {
  outline: none; border-color: var(--accent);
}
.form-textarea { resize: vertical; min-height: 80px; }
.form-row { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 12px; }
.form-row-3 { display: grid; grid-template-columns: repeat(3, minmax(0, 1fr)); gap: 12px; }
.form-hint { font-size: 11px; color: var(--fg3); margin-top: 4px; }

/* ---- MODAL ---- */
.modal-overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,0.7);
  display: flex; align-items: flex-start; justify-content: center;
  z-index: 100; padding: 40px 20px; overflow-y: auto;
}
.modal {
  background: var(--bg2); border: 1px solid var(--border2);
  border-radius: var(--radius-lg); padding: 28px;
  width: 100%; max-width: 680px; box-shadow: var(--shadow);
  overflow: hidden;
}
.modal-wide { max-width: 800px; }
.modal h3 {
  font-size: 18px; font-weight: 700; margin-bottom: 20px;
  padding-bottom: 12px; border-bottom: 1px solid var(--border);
}
.modal-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 20px; padding-top: 16px; border-top: 1px solid var(--border); }

/* ---- INVOICE VIEWER ---- */
.invoice-page {
  background: #fff; color: #1a1a1a; border-radius: var(--radius-lg);
  padding: 48px; max-width: 800px; margin: 0 auto;
  box-shadow: 0 4px 24px rgba(0,0,0,0.5);
  overflow: hidden; box-sizing: border-box;
}
.invoice-page h2 { color: #1a1a1a; font-size: 28px; }
.invoice-page .inv-header {
  display: flex; justify-content: space-between; margin-bottom: 32px;
  padding-bottom: 24px; border-bottom: 2px solid #c9a227;
  flex-wrap: wrap; gap: 16px;
}
.invoice-page .inv-biz { font-size: 13px; color: #555; line-height: 1.8; min-width: 0; }
.invoice-page .inv-biz strong { color: #1a1a1a; font-size: 20px; display: block; margin-bottom: 4px; }
.invoice-page .inv-meta { font-size: 13px; color: #555; text-align: right; line-height: 1.8; min-width: 0; }
.invoice-page .inv-meta strong { color: #1a1a1a; }
.invoice-page .inv-bill { margin-bottom: 24px; }
.invoice-page .inv-bill label { font-size: 11px; color: #999; text-transform: uppercase; letter-spacing: 0.5px; }
.invoice-page .inv-bill p { font-size: 14px; color: #333; margin-top: 4px; line-height: 1.6; word-wrap: break-word; }
.invoice-page table { width: 100%; border-collapse: collapse; margin: 20px 0; table-layout: fixed; }
.invoice-page th {
  background: #f5f3ee; color: #555; font-size: 11px; text-transform: uppercase;
  padding: 10px 14px; text-align: left; border-bottom: 1px solid #ddd;
  letter-spacing: 0.5px; position: static;
}
.invoice-page td { padding: 10px 14px; border-bottom: 1px solid #eee; font-size: 13px; color: #333; word-wrap: break-word; }
.invoice-page .inv-total-row td { font-weight: 700; border-top: 2px solid #c9a227; border-bottom: none; font-size: 15px; color: #1a1a1a; }
.invoice-page .inv-payments {
  background: #f9f8f5; border-radius: 8px; padding: 20px; margin-top: 24px;
}
.invoice-page .inv-payments h4 { font-size: 13px; color: #999; text-transform: uppercase; margin-bottom: 12px; letter-spacing: 0.5px; }
.invoice-page .inv-payments .pay-method {
  display: flex; justify-content: space-between; padding: 6px 0;
  font-size: 13px; color: #555; border-bottom: 1px solid #eee;
  flex-wrap: wrap; gap: 4px;
}
.invoice-page .inv-payments .pay-method:last-child { border-bottom: none; }
.invoice-page .inv-payments .pay-method strong { color: #333; }

/* ---- CONTRACT VIEWER ---- */
.contract-page {
  background: #fff; color: #1a1a1a; border-radius: var(--radius-lg);
  padding: 48px; max-width: 800px; margin: 0 auto;
  box-shadow: 0 4px 24px rgba(0,0,0,0.5);
  overflow: hidden; box-sizing: border-box;
}
.contract-header {
  display: flex; justify-content: space-between; margin-bottom: 32px;
  padding-bottom: 24px; border-bottom: 2px solid #c9a227;
  flex-wrap: wrap; gap: 16px;
}
.contract-biz { font-size: 13px; color: #555; line-height: 1.8; }
.contract-biz strong { color: #1a1a1a; font-size: 20px; display: block; margin-bottom: 4px; }
.contract-meta {
  text-align: right; display: flex; flex-direction: column;
  align-items: flex-end; gap: 2px; font-size: 13px; color: #555;
}
.contract-meta strong { color: #c9a227; font-size: 24px; letter-spacing: 1px; }
.contract-body { margin: 24px 0; }
.contract-editor {
  width: 100%; min-height: 400px; padding: 24px;
  background: #faf9f6; border: 1px solid #e0ddd6;
  border-radius: 6px; font-family: 'DM Sans', sans-serif;
  font-size: 13px; line-height: 1.9; color: #333;
  resize: vertical; outline: none;
  transition: border-color 0.15s;
}
.contract-editor:focus { border-color: #c9a227; }
.contract-notes {
  margin-top: 20px; padding: 14px 18px;
  background: #f9f8f5; border-radius: 6px;
  font-size: 12px; color: #777; line-height: 1.6;
}
.contract-notes strong { color: #555; }
.contract-text {
  background: var(--bg); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 20px;
  white-space: pre-wrap; font-size: 13px; line-height: 1.8;
  max-height: 500px; overflow-y: auto; color: var(--fg2);
}

/* ---- TOAST ---- */
.toast {
  position: fixed; bottom: 24px; right: 24px;
  background: var(--bg3); border: 1px solid var(--border2);
  border-radius: var(--radius); padding: 12px 20px;
  font-size: 13px; color: var(--fg); z-index: 200;
  box-shadow: var(--shadow); animation: toastIn 0.3s ease;
  display: flex; align-items: center; gap: 8px;
}
.toast.error { border-color: rgba(201,68,68,0.3); }
@keyframes toastIn {
  from { opacity: 0; transform: translateY(10px); }
  to { opacity: 1; transform: translateY(0); }
}

/* ---- LOADING ---- */
.loading {
  display: flex; align-items: center; justify-content: center;
  height: 100vh; font-size: 16px; color: var(--fg3);
}
.loading-spinner {
  width: 24px; height: 24px; border: 2px solid var(--bg4);
  border-top-color: var(--accent); border-radius: 50%;
  animation: spin 0.8s linear infinite; margin-right: 12px;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* ---- ALERT BAR ---- */
.alert-bar {
  background: var(--red-bg); border: 1px solid rgba(201,68,68,0.2);
  border-radius: var(--radius); padding: 12px 16px;
  margin-bottom: 16px; display: flex; align-items: center; gap: 8px;
}
.alert-bar .alert-icon { color: var(--red-fg); font-size: 16px; }
.alert-bar .alert-text { font-size: 12px; color: var(--red-fg); }

/* ---- EMPTY STATE ---- */
.empty {
  text-align: center; padding: 60px 20px; color: var(--fg3);
}
.empty p { font-size: 14px; margin-bottom: 16px; }

/* ---- RESPONSIVE ---- */
@media (max-width: 768px) {
  .sidebar { display: none; }
  .main { padding: 16px; }
  .metrics { grid-template-columns: repeat(2, 1fr); }
  .form-row, .form-row-3 { grid-template-columns: 1fr; }
  .modal { padding: 20px; }
  .invoice-page { padding: 24px; }
}

/* ---- PRINT ---- */
@media print {
  body { background: #fff; }
  .sidebar, .page-header-actions, .btn, .filters, .alert-bar, .toast, .metric-card, .page-header { display: none !important; }
  .main { padding: 0; overflow: visible; }
  .invoice-page { box-shadow: none; padding: 20px; }
  .contract-page { box-shadow: none; padding: 20px; }
  .contract-editor { border: none; background: #fff; padding: 0; min-height: auto; }
}
</style>
</head>
<body>
<div class="loading" id="loadingScreen">
  <div class="loading-spinner"></div>
  Loading JPPF Business Manager...
</div>

<div class="app" id="app" style="display:none;">
  <nav class="sidebar" id="sidebar"></nav>
  <main class="main" id="mainContent"></main>
</div>

<script>
// ============================================================
// JPPF BUSINESS MANAGER — Application Logic
// ============================================================

// ---- CONFIG ----
// IMPORTANT: Replace this URL with your Google Apps Script deployment URL
var API_URL = "https://script.google.com/macros/s/AKfycbxyq9kzUoi73aTONzRyqV2XuvYIx8hpL6aZmdX5RdKDowSEPqU220YOFzsicNb-RgGx/exec";

// ---- STATE ----
var S = {
  view: "dashboard",
  jobs: [],
  invoices: [],
  contracts: [],
  expenses: [],
  payments: [],
  settings: {},
  filter: "all",
  filterQuarter: "all",
  paymentQuarter: "all",
  editingJob: null,
  editingInvoice: null,
  editingContract: null,
  editingExpense: null,
  viewingInvoice: null,
  viewingContract: null,
  viewingJob: null,
  loaded: false,
  nextInvoiceNum: 1048
};

// ---- JSONP API ----
function api(params) {
  return new Promise(function(resolve) {
    var cbName = "jcb_" + Date.now() + "_" + Math.floor(Math.random()*10000);
    var timeout = setTimeout(function() {
      delete window[cbName];
      if (script.parentNode) script.parentNode.removeChild(script);
      resolve({ success: false, error: "Request timed out" });
    }, 20000);
    window[cbName] = function(data) {
      clearTimeout(timeout);
      delete window[cbName];
      if (script.parentNode) script.parentNode.removeChild(script);
      resolve(data);
    };
    var script = document.createElement("script");
    script.src = API_URL + "?" + params + "&callback=" + cbName;
    script.onerror = function() {
      clearTimeout(timeout);
      delete window[cbName];
      if (script.parentNode) script.parentNode.removeChild(script);
      resolve({ success: false, error: "Network error" });
    };
    document.body.appendChild(script);
  });
}

function apiWrite(payload) {
  return api("payload=" + encodeURIComponent(JSON.stringify(payload)));
}

// ---- LOAD DATA ----
async function loadAll() {
  var data = await api("action=getAll");
  if (data.success) {
    S.jobs = data.jobs || [];
    S.invoices = data.invoices || [];
    S.contracts = data.contracts || [];
    S.expenses = data.expenses || [];
    S.payments = data.payments || [];
    S.settings = data.settings || {};
    // Calculate next invoice number
    var maxNum = 1047;
    S.invoices.forEach(function(inv) {
      var n = parseInt(inv.InvoiceNumber);
      if (n > maxNum) maxNum = n;
    });
    S.nextInvoiceNum = maxNum + 1;
    S.loaded = true;
    return true;
  }
  return false;
}

// ---- TOAST ----
function toast(msg, isError) {
  var el = document.createElement("div");
  el.className = "toast" + (isError ? " error" : "");
  el.textContent = msg;
  document.body.appendChild(el);
  setTimeout(function() { el.remove(); }, 3000);
}

// ---- HELPERS ----
function fmt$(n) {
  n = parseFloat(n) || 0;
  return "$" + n.toLocaleString("en-US", { minimumFractionDigits: 2, maximumFractionDigits: 2 });
}

function fmtDate(d) {
  if (!d) return "—";
  var parts = String(d).split("-");
  if (parts.length === 3) return parseInt(parts[1]) + "/" + parseInt(parts[2]) + "/" + parts[0];
  return d;
}

function getQuarter(dateStr) {
  if (!dateStr) return "Unknown";
  var parts = String(dateStr).split("-");
  if (parts.length < 2) return "Unknown";
  var y = parts[0], m = parseInt(parts[1]);
  var q = m <= 3 ? "Q1" : m <= 6 ? "Q2" : m <= 9 ? "Q3" : "Q4";
  return q + " " + y;
}

function getQuarters() {
  if (S.settings.quarters && S.settings.quarters.length) return S.settings.quarters;
  var qs = {};
  S.jobs.forEach(function(j) { var q = getQuarter(j.EventDate); if (q !== "Unknown") qs[q] = 1; });
  return Object.keys(qs).sort();
}

function getSetting(key, fallback) {
  return S.settings[key] || fallback || [];
}

function pipelineStages() {
  return getSetting("pipelineStages", ["Lead","Contracted","Deposit Paid","Shot","Invoiced","Paid","Complete"]);
}

function pipelineIndex(status) {
  var stages = pipelineStages();
  var idx = stages.indexOf(status);
  return idx >= 0 ? idx : 0;
}

function jobsForQuarter(q) {
  return S.jobs.filter(function(j) { return getQuarter(j.EventDate) === q; });
}

function needsAction(j) {
  return j.PaymentStatus === "Unpaid" || j.TaxStatus === "Unknown" || j.PipelineStatus === "Lead" || j.PipelineStatus === "Invoiced";
}

function getJobInvoices(jobId) {
  return S.invoices.filter(function(i) { return i.JobID === jobId; });
}

function getJobContracts(jobId) {
  return S.contracts.filter(function(c) { return c.JobID === jobId; });
}

function getJobExpenses(jobId) {
  return S.expenses.filter(function(e) { return e.JobID === jobId; });
}

function getJobPayments(jobId) {
  return S.payments.filter(function(p) { return p.JobID === jobId; });
}

function getJobTotalReceived(jobId) {
  var total = 0;
  getJobPayments(jobId).forEach(function(p) { total += parseFloat(p.NetAmount) || 0; });
  return total;
}

// ---- RENDER: DASHBOARD ----
function renderDashboard() {
  var quarters = getQuarters();
  var allJobs = S.jobs;
  var filtered = S.filterQuarter === "all" ? allJobs : allJobs.filter(function(j) { return getQuarter(j.EventDate) === S.filterQuarter; });
  if (S.filter === "action") filtered = filtered.filter(needsAction);

  // Metrics
  var ytdGross = 0, ytdNet = 0, jobCount = 0, actionItems = 0;
  var currentYear = new Date().getFullYear();
  allJobs.forEach(function(j) {
    var jYear = j.EventDate ? parseInt(String(j.EventDate).split("-")[0]) : 0;
    if (jYear === currentYear) {
      ytdGross += parseFloat(j.GrossTotal) || 0;
      ytdNet += parseFloat(j.NetReceived) || 0;
      jobCount++;
    }
    if (needsAction(j)) actionItems++;
  });

  // Quarter metrics
  var qMetrics = {};
  quarters.forEach(function(q) {
    qMetrics[q] = { gross: 0, net: 0, count: 0 };
    jobsForQuarter(q).forEach(function(j) {
      qMetrics[q].gross += parseFloat(j.GrossTotal) || 0;
      qMetrics[q].net += parseFloat(j.NetReceived) || 0;
      qMetrics[q].count++;
    });
  });

  var html = '<div class="page-header"><h2>Client dashboard</h2><div class="page-header-actions">'
    + '<button class="btn btn-accent" onclick="openJobEditor()">+ New job</button></div></div>';

  // Metrics cards
  html += '<div class="metrics">';
  // Show last 3 quarters + YTD
  var recentQs = quarters.slice(-3);
  recentQs.forEach(function(q) {
    var m = qMetrics[q];
    html += '<div class="metric-card"><div class="metric-label">' + q + ' gross</div>'
      + '<div class="metric-value">' + fmt$(m.gross) + '</div>'
      + '<div class="metric-sub">' + m.count + ' jobs</div></div>';
  });
  html += '<div class="metric-card"><div class="metric-label">YTD ' + currentYear + '</div>'
    + '<div class="metric-value">' + fmt$(ytdGross) + '</div>'
    + '<div class="metric-sub">' + fmt$(ytdNet) + ' net received</div></div>';
  html += '</div>';

  // Alerts
  var alerts = [];
  S.jobs.forEach(function(j) {
    if (j.PaymentStatus === "Unpaid" && parseFloat(j.GrossTotal) > 0) alerts.push(j.ClientName + " — " + fmt$(j.GrossTotal) + " unpaid");
    if (j.TaxStatus === "Unknown") alerts.push(j.ClientName + " — tax status unknown");
  });
  if (alerts.length) {
    html += '<div class="alert-bar"><span class="alert-icon">!</span><span class="alert-text">'
      + alerts.length + ' items need attention: ' + alerts.join(' · ') + '</span></div>';
  }

  // Filters
  html += '<div class="filters">';
  html += '<button class="filter-chip' + (S.filterQuarter === "all" ? ' active' : '') + '" onclick="setFilter(\'all\',\'quarter\')">All</button>';
  quarters.forEach(function(q) {
    html += '<button class="filter-chip' + (S.filterQuarter === q ? ' active' : '') + '" onclick="setFilter(\'' + q + '\',\'quarter\')">' + q + '</button>';
  });
  if (actionItems > 0) {
    html += '<button class="filter-chip' + (S.filter === "action" ? ' danger' : '') + '" onclick="setFilter(\'action\',\'status\')" style="margin-left:auto;">Needs action (' + actionItems + ')</button>';
  }
  html += '</div>';

  // Table
  html += '<div class="table-wrap"><div class="table-scroll"><table><thead><tr>'
    + '<th>Job / client</th><th>Date</th><th>Location</th><th>Tax</th>'
    + '<th>Pipeline</th><th>Gross</th><th>Net</th><th>Payment</th>'
    + '</tr></thead><tbody>';

  // Group by quarter
  var grouped = {};
  filtered.forEach(function(j) {
    var q = getQuarter(j.EventDate);
    if (!grouped[q]) grouped[q] = [];
    grouped[q].push(j);
  });

  // Show "No date" jobs first, then quarters in reverse order
  var qOrder = quarters.slice().reverse();
  var allGroups = [];
  if (grouped["Unknown"] && grouped["Unknown"].length) allGroups.push("Unknown");
  qOrder.forEach(function(q) { if (grouped[q] && grouped[q].length) allGroups.push(q); });

  allGroups.forEach(function(q) {
    var qGross = 0;
    grouped[q].forEach(function(j) { qGross += parseFloat(j.GrossTotal) || 0; });
    var label = q === "Unknown" ? "No date" : q;
    html += '<tr class="section-row"><td colspan="8">' + label + ' — ' + fmt$(qGross) + '</td></tr>';

    grouped[q].forEach(function(j) {
      var stages = pipelineStages();
      var pipHtml = '<div class="pipeline" onclick="event.stopPropagation()">';
      for (var p = 0; p < stages.length; p++) {
        var cls = getPipeDisplay(j, p);
        pipHtml += '<div class="pip ' + cls + '" onclick="updatePipeline(\'' + j.ID + '\',' + p + ')" title="' + stages[p] + '"></div>';
      }
      pipHtml += '<span class="pip-label" onclick="cyclePipeline(\'' + j.ID + '\')">' + getPipeLabel(j) + '</span></div>';

      var taxCls = j.TaxStatus === "Taxable" ? "taxable" : j.TaxStatus === "Non-Profit" ? "nonprofit" : "unknown";
      var payCls = j.PaymentStatus === "Paid" ? "paid" : j.PaymentStatus === "Unpaid" ? "unpaid" : "deposit";

      html += '<tr class="clickable" onclick="openJobDetail(\'' + j.ID + '\')">'
        + '<td><strong>' + (j.JobName || j.ClientName || "—") + '</strong>'
        + (j.ClientName && j.JobName ? '<br><span style="color:var(--fg3);font-size:12px;">' + j.ClientName + '</span>' : '') + '</td>'
        + '<td>' + fmtDate(j.EventDate) + '</td>'
        + '<td style="font-size:12px;">' + (j.JobLocation || "—") + '</td>'
        + '<td><span class="badge badge-' + taxCls + '">' + (j.TaxStatus || "Unknown") + '</span></td>'
        + '<td>' + pipHtml + '</td>'
        + '<td class="money">' + fmt$(j.GrossTotal) + '</td>'
        + '<td class="money">' + fmt$(j.NetReceived) + '</td>'
        + '<td><span class="badge badge-' + payCls + '">' + (j.PaymentStatus || "Unpaid") + '</span></td>'
        + '</tr>';
    });
  });

  if (!filtered.length) {
    html += '<tr><td colspan="8" class="empty"><p>No jobs found</p></td></tr>';
  }

  html += '</tbody></table></div></div>';
  document.getElementById("mainContent").innerHTML = html;
}

// ---- RENDER: JOB DETAIL ----
function renderJobDetail(jobId) {
  var job = S.jobs.find(function(j) { return j.ID === jobId; });
  if (!job) { navigate("dashboard"); return; }

  var invoices = getJobInvoices(jobId);
  var contracts = getJobContracts(jobId);
  var expenses = getJobExpenses(jobId);

  var html = '<div class="page-header"><h2 style="display:flex;align-items:center;gap:12px;">'
    + '<button class="btn btn-ghost btn-sm" onclick="navigate(\'dashboard\')">&larr;</button>'
    + '<span>' + (job.JobName || job.ClientName || "—")
    + (job.ClientName && job.JobName ? '<span style="font-weight:400;font-size:14px;color:var(--fg3);margin-left:10px;">' + job.ClientName + '</span>' : '')
    + '</span></h2>'
    + '<div class="page-header-actions">'
    + '<button class="btn btn-sm" onclick="openJobEditor(\'' + jobId + '\')">Edit job</button>'
    + '<button class="btn btn-sm btn-accent" onclick="openInvoiceEditor(\'' + jobId + '\')">Generate invoice</button>'
    + '<button class="btn btn-sm" onclick="openContractEditor(\'' + jobId + '\')">Add contract</button>'
    + '<button class="btn btn-sm btn-danger" onclick="deleteJob(\'' + jobId + '\')">Delete</button>'
    + '</div></div>';

  // Job info cards
  html += '<div class="metrics">';
  html += '<div class="metric-card"><div class="metric-label">Gross total</div><div class="metric-value">' + fmt$(job.GrossTotal) + '</div></div>';
  html += '<div class="metric-card"><div class="metric-label">Net received</div><div class="metric-value">' + fmt$(job.NetReceived) + '</div></div>';
  html += '<div class="metric-card"><div class="metric-label">Processing fees</div><div class="metric-value">' + fmt$(job.ProcessingFees) + '</div></div>';
  var expTotal = 0; expenses.forEach(function(e) { expTotal += parseFloat(e.Amount) || 0; });
  html += '<div class="metric-card"><div class="metric-label">Job expenses</div><div class="metric-value">' + fmt$(expTotal) + '</div></div>';
  html += '</div>';

  // Details grid
  html += '<div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:24px;">';

  // Left: Job info
  html += '<div class="metric-card"><div class="metric-label" style="margin-bottom:12px;">Job details</div>';
  var details = [
    ["Service", job.ServiceType], ["Event date", fmtDate(job.EventDate)],
    ["Job location", job.JobLocation], ["Client location", job.ClientLocation],
    ["Tax status", job.TaxStatus], ["Tax rate", job.TaxRate ? job.TaxRate + "%" : "—"],
    ["Payment method", job.PaymentMethod], ["Pipeline", job.PipelineStatus]
  ];
  details.forEach(function(d) {
    html += '<div style="display:flex;justify-content:space-between;padding:4px 0;border-bottom:1px solid var(--border);font-size:13px;">'
      + '<span style="color:var(--fg3);">' + d[0] + '</span><span>' + (d[1] || "—") + '</span></div>';
  });
  if (job.Notes) html += '<div style="margin-top:8px;font-size:12px;color:var(--fg3);">' + job.Notes + '</div>';
  if (job.ExpenseNotes) html += '<div style="margin-top:8px;font-size:12px;color:var(--fg3);"><strong>Expense notes:</strong> ' + job.ExpenseNotes + '</div>';
  html += '</div>';

  // Right: Pipeline
  html += '<div class="metric-card"><div class="metric-label" style="margin-bottom:12px;">Pipeline progress <span style="font-size:10px;font-weight:400;color:var(--fg3);">click to cycle</span></div>';
  var stages = pipelineStages();
  var pipeStates = getPipeStates(job);
  stages.forEach(function(stage, i) {
    var status = pipeStates[stage] || "pending";
    var colors = { done: "var(--green-fg)", current: "var(--yellow-fg)", na: "var(--purple-fg)", pending: "var(--fg3)" };
    var icons = { done: "&#10003;", current: "&#9679;", na: "—", pending: "&#9675;" };
    var color = colors[status] || colors.pending;
    var icon = icons[status] || icons.pending;
    var stateLabel = { done: "Done", current: "In progress", na: "N/A", pending: "" };
    html += '<div style="display:flex;align-items:center;gap:10px;padding:6px 8px;font-size:13px;cursor:pointer;border-radius:var(--radius);transition:background 0.1s;" '
      + 'onmouseover="this.style.background=\'var(--bg3)\'" onmouseout="this.style.background=\'none\'" '
      + 'onclick="updatePipeline(\'' + job.ID + '\',' + i + ')">'
      + '<span style="color:' + color + ';font-size:16px;width:20px;text-align:center;">' + icon + '</span>'
      + '<span style="color:' + color + ';flex:1;">' + stage + '</span>';
    if (stateLabel[status]) html += '<span style="font-size:11px;color:' + color + ';">' + stateLabel[status] + '</span>';
    html += '</div>';
  });
  html += '</div></div>';

  // Invoices
  html += '<div style="margin-bottom:24px;"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;">'
    + '<h3 style="font-size:16px;font-weight:600;">Invoices</h3>'
    + '<button class="btn btn-sm btn-accent" onclick="openInvoiceEditor(\'' + jobId + '\')">+ Generate invoice</button></div>';
  if (invoices.length) {
    html += '<div class="table-wrap"><div class="table-scroll"><table><thead><tr><th>#</th><th>Filed</th><th>Total</th><th>Status</th><th>Actions</th></tr></thead><tbody>';
    invoices.forEach(function(inv) {
      html += '<tr><td>#' + inv.InvoiceNumber + '</td><td>' + fmtDate(inv.DateFiled) + '</td>'
        + '<td class="money">' + fmt$(inv.TotalDue) + '</td>'
        + '<td><span class="badge badge-' + (inv.Status || "draft").toLowerCase() + '">' + (inv.Status || "Draft") + '</span></td>'
        + '<td><button class="btn btn-sm btn-ghost" onclick="viewInvoice(\'' + inv.ID + '\')">View</button>'
        + '<button class="btn btn-sm btn-ghost" onclick="openInvoiceEditor(\'' + jobId + '\',\'' + inv.ID + '\')">Edit</button></td></tr>';
    });
    html += '</tbody></table></div></div>';
  } else {
    html += '<div class="empty" style="padding:24px;"><p>No invoices yet</p></div>';
  }
  html += '</div>';

  // Contracts
  html += '<div style="margin-bottom:24px;"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;">'
    + '<h3 style="font-size:16px;font-weight:600;">Contracts</h3>'
    + '<button class="btn btn-sm" onclick="openContractEditor(\'' + jobId + '\')">+ Add contract</button></div>';
  if (contracts.length) {
    contracts.forEach(function(con) {
      html += '<div class="metric-card" style="margin-bottom:8px;"><div style="display:flex;justify-content:space-between;align-items:center;">'
        + '<div><span class="badge badge-' + (con.Status || "draft").toLowerCase() + '">' + (con.Status || "Draft") + '</span>'
        + ' <span style="font-size:12px;color:var(--fg3);margin-left:8px;">' + fmtDate(con.DateCreated) + '</span></div>'
        + '<div style="display:flex;gap:6px;">';
      if (con.SignedLink) html += '<a href="' + con.SignedLink + '" target="_blank" class="btn btn-sm btn-ghost">Signed copy</a>';
      html += '<button class="btn btn-sm btn-ghost" onclick="viewContract(\'' + con.ID + '\')">View</button>'
        + '<button class="btn btn-sm btn-ghost" onclick="openContractEditor(\'' + jobId + '\',\'' + con.ID + '\')">Edit</button>'
        + '</div></div></div>';
    });
  } else {
    html += '<div class="empty" style="padding:24px;"><p>No contracts yet</p></div>';
  }
  html += '</div>';

  // Job payments
  var jobPayments = getJobPayments(jobId);
  var payTotal = 0; jobPayments.forEach(function(p) { payTotal += parseFloat(p.NetAmount) || 0; });
  var remaining = (parseFloat(job.GrossTotal) || 0) - payTotal;
  var isResolved = job.PaymentResolved || false;
  var resolvedReason = job.ResolvedReason || "";

  var payStatusHtml = '';
  if (remaining <= 0) {
    payStatusHtml = ' <span style="font-size:13px;font-weight:400;color:var(--green-fg);">(paid in full)</span>';
  } else if (isResolved) {
    payStatusHtml = ' <span style="font-size:13px;font-weight:400;color:var(--purple-fg);">(resolved — ' + resolvedReason + ')</span>';
  } else {
    payStatusHtml = ' <span style="font-size:13px;font-weight:400;color:var(--red-fg);">(' + fmt$(remaining) + ' remaining)</span>';
  }

  html += '<div style="margin-bottom:24px;"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;">'
    + '<h3 style="font-size:16px;font-weight:600;">Payments' + payStatusHtml + '</h3>'
    + '<div style="display:flex;gap:6px;">';
  if (remaining > 0 && !isResolved) {
    html += '<button class="btn btn-sm" onclick="resolvePayment(\'' + jobId + '\')">Mark resolved</button>';
  } else if (isResolved) {
    html += '<button class="btn btn-sm" onclick="unresolvePayment(\'' + jobId + '\')">Reopen</button>';
  }
  html += '<button class="btn btn-sm btn-accent" onclick="openPaymentEditor(\'\',\'' + jobId + '\')">+ Log payment</button></div></div>';
  if (jobPayments.length) {
    html += '<div class="table-wrap"><div class="table-scroll"><table><thead><tr><th>Date</th><th>Type</th><th>Gross</th><th>Fees</th><th>Net</th><th>Method</th><th>Notes</th><th></th></tr></thead><tbody>';
    jobPayments.forEach(function(p) {
      var typeCls = p.Type === "Deposit" ? "deposit" : p.Type === "Final Payment" ? "paid" : "partial";
      html += '<tr><td>' + fmtDate(p.DateReceived) + '</td>'
        + '<td><span class="badge badge-' + typeCls + '">' + (p.Type || "Payment") + '</span></td>'
        + '<td class="money">' + fmt$(p.GrossAmount) + '</td>'
        + '<td class="money" style="color:var(--fg3);">' + (parseFloat(p.Fees) ? fmt$(p.Fees) : "—") + '</td>'
        + '<td class="money" style="color:var(--green-fg);">' + fmt$(p.NetAmount) + '</td>'
        + '<td style="font-size:12px;color:var(--fg3);">' + (p.Method || "—") + '</td>'
        + '<td style="font-size:11px;color:var(--fg3);">' + (p.Notes || "—") + '</td>'
        + '<td style="white-space:nowrap;"><button class="btn btn-sm btn-ghost" onclick="openPaymentEditor(\'' + p.ID + '\')">Edit</button>'
        + '<button class="btn btn-sm btn-ghost btn-danger" onclick="deletePayment(\'' + p.ID + '\')">Del</button></td></tr>';
    });
    html += '</tbody></table></div></div>';
  } else {
    html += '<div class="empty" style="padding:24px;"><p>No payments logged yet</p></div>';
  }
  html += '</div>';

  // Job expenses
  html += '<div><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;">'
    + '<h3 style="font-size:16px;font-weight:600;">Job expenses</h3>'
    + '<button class="btn btn-sm" onclick="openExpenseEditor(\'\',\'' + jobId + '\')">+ Add expense</button></div>';
  if (expenses.length) {
    html += '<div class="table-wrap"><div class="table-scroll"><table><thead><tr><th>Date</th><th>Category</th><th>Amount</th><th>Description</th><th></th></tr></thead><tbody>';
    expenses.forEach(function(exp) {
      html += '<tr><td>' + fmtDate(exp.Date) + '</td><td>' + (exp.Category || "—") + '</td>'
        + '<td class="money">' + fmt$(exp.Amount) + '</td><td style="font-size:12px;color:var(--fg3);">' + (exp.Description || "—") + '</td>'
        + '<td><button class="btn btn-sm btn-ghost" onclick="openExpenseEditor(\'' + exp.ID + '\')">Edit</button></td></tr>';
    });
    html += '</tbody></table></div></div>';
  } else {
    html += '<div class="empty" style="padding:24px;"><p>No expenses logged</p></div>';
  }
  html += '</div>';

  document.getElementById("mainContent").innerHTML = html;
}

// ---- RENDER: PAYMENTS ----
function renderPayments() {
  var allPayments = S.payments.slice().sort(function(a, b) {
    return (b.DateReceived || "").localeCompare(a.DateReceived || "");
  });

  // Quarter filter for payments
  var payQuarter = S.paymentQuarter || "all";
  var filteredPayments = payQuarter === "all" ? allPayments : allPayments.filter(function(p) {
    return getQuarter(p.DateReceived) === payQuarter;
  });

  // Metrics from payment ledger
  var totalReceived = 0, totalFees = 0;
  filteredPayments.forEach(function(p) {
    totalReceived += parseFloat(p.NetAmount) || 0;
    totalFees += parseFloat(p.Fees) || 0;
  });

  var totalBilled = 0;
  S.jobs.forEach(function(j) { totalBilled += parseFloat(j.GrossTotal) || 0; });
  var totalOutstanding = totalBilled - totalReceived;

  // Jobs with outstanding balances
  var outstandingJobs = S.jobs.filter(function(j) {
    var gross = parseFloat(j.GrossTotal) || 0;
    if (gross === 0) return false;
    if (j.PaymentResolved) return false;
    var received = getJobTotalReceived(j.ID);
    return received < gross;
  });

  var resolvedJobs = S.jobs.filter(function(j) {
    return j.PaymentResolved && (parseFloat(j.GrossTotal) || 0) > 0;
  });

  var html = '<div class="page-header"><h2>Payments</h2><div class="page-header-actions">'
    + '<button class="btn btn-accent" onclick="openPaymentEditor()">+ Log payment</button></div></div>';

  // Metrics
  html += '<div class="metrics">';
  html += '<div class="metric-card" style="border-left:3px solid var(--red);"><div class="metric-label">Outstanding</div>'
    + '<div class="metric-value" style="color:var(--red-fg);">' + fmt$(totalOutstanding) + '</div>'
    + '<div class="metric-sub">' + outstandingJobs.length + ' jobs</div></div>';
  html += '<div class="metric-card" style="border-left:3px solid var(--green);"><div class="metric-label">Received' + (payQuarter !== "all" ? ' (' + payQuarter + ')' : '') + '</div>'
    + '<div class="metric-value" style="color:var(--green-fg);">' + fmt$(totalReceived) + '</div>'
    + '<div class="metric-sub">' + filteredPayments.length + ' payments</div></div>';

      + '<th>Job / client</th><th>Billed</th><th>Received</th><th>Remaining</th><th></th>'
      + '</tr></thead><tbody>';

      var gross = parseFloat(j.GrossTotal) || 0;
      var received = getJobTotalReceived(j.ID);
      var rem = gross - received;
      html += '<tr class="clickable" onclick="openJobDetail(\'' + j.ID + '\')">'
        + '<td><strong>' + (j.JobName || j.ClientName || "—") + '</strong>'
        + (j.ClientName && j.JobName ? '<br><span style="color:var(--fg3);font-size:11px;">' + j.ClientName + '</span>' : '') + '</td>'
        + '<td class="money">' + fmt$(gross) + '</td>'
        + '<td class="money" style="color:var(--green-fg);">' + fmt$(received) + '</td>'
        + '<td class="money" style="color:var(--red-fg);font-weight:600;">' + fmt$(rem) + '</td>'
        + '<td><button class="btn btn-sm btn-accent" onclick="event.stopPropagation();openPaymentEditor(\'\',\'' + j.ID + '\')">Log payment</button></td>'
        + '</tr>';
    });
    html += '</tbody></table></div></div></div></div>';
  }

  // Resolved jobs — collapsible
  if (resolvedJobs.length) {
    html += '<div style="margin-bottom:16px;">'
      + '<div style="display:flex;align-items:center;gap:8px;cursor:pointer;padding:8px 0;" onclick="toggleSection(\'payResolved\')">'
      + '<span style="font-size:13px;font-weight:600;color:var(--purple-fg);">Resolved (' + resolvedJobs.length + ')</span>'
      + '<span style="color:var(--fg3);font-size:11px;" id="payResolvedArrow">&#9654;</span></div>'
      + '<div id="payResolved" style="display:none;">';
    html += '<div class="table-wrap" style="border-color:rgba(136,102,187,0.2);"><div class="table-scroll"><table><thead><tr>'
      + '<th>Job / client</th><th>Billed</th><th>Received</th><th>Waived</th><th>Reason</th><th></th>'
      + '</tr></thead><tbody>';

      var gross = parseFloat(j.GrossTotal) || 0;

      var waived = gross - received;

        + '<td>' + (j.JobName || j.ClientName || "—") + (j.ClientName && j.JobName ? '<br><span style="color:var(--fg3);font-size:11px;">' + j.ClientName + '</span>' : '') + '</td>'
        + '<td class="money">' + fmt$(gross) + '</td>'
        + '<td class="money" style="color:var(--green-fg);">' + fmt$(received) + '</td>'
        + '<td class="money" style="color:var(--purple-fg);">' + fmt$(waived) + '</td>'
        + '<td style="font-size:12px;color:var(--purple-fg);">' + (j.ResolvedReason || "—") + '</td>'
        + '<td><button class="btn btn-sm btn-ghost" onclick="unresolvePayment(\'' + j.ID + '\');navigate(\'payments\');">Reopen</button></td>'
        + '</tr>';
    });
    html += '</tbody></table></div></div></div></div>';
  }

  // Payment ledger — collapsible
  html += '<div style="margin-bottom:16px;">'
    + '<div style="display:flex;align-items:center;gap:8px;cursor:pointer;padding:8px 0;" onclick="toggleSection(\'payLedger\')">'
    + '<span style="font-size:13px;font-weight:600;color:var(--fg);">Payment ledger (' + filteredPayments.length + ')</span>'
    + '<span style="color:var(--fg3);font-size:11px;" id="payLedgerArrow">&#9660;</span></div>'
    + '<div id="payLedger">';

    html += '<div class="empty"><p>No payments logged' + (payQuarter !== "all" ? ' for ' + payQuarter : '') + '.</p></div>';
  } else {
    html += '<div class="table-wrap"><div class="table-scroll"><table><thead><tr>'
      + '<th>Date received</th><th>Job / client</th><th>Type</th><th>Gross</th><th>Fees</th><th>Net received</th><th>Method</th><th>Notes</th><th></th>'
      + '</tr></thead><tbody>';

      var typeCls = p.Type === "Deposit" ? "deposit" : p.Type === "Final Payment" ? "paid" : "partial";

        + '<td>' + fmtDate(p.DateReceived) + '</td>'
        + '<td><strong>' + (p.JobName || "—") + '</strong>'
        + (p.ClientName ? '<br><span style="color:var(--fg3);font-size:11px;">' + p.ClientName + '</span>' : '') + '</td>'
        + '<td><span class="badge badge-' + typeCls + '">' + (p.Type || "Payment") + '</span></td>'
        + '<td class="money">' + fmt$(p.GrossAmount) + '</td>'
        + '<td class="money" style="color:var(--fg3);">' + (parseFloat(p.Fees) ? fmt$(p.Fees) : "—") + '</td>'
        + '<td class="money" style="color:var(--green-fg);">' + fmt$(p.NetAmount) + '</td>'
        + '<td style="font-size:12px;color:var(--fg3);">' + (p.Method || "—") + '</td>'
        + '<td style="font-size:11px;color:var(--fg3);max-width:150px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">' + (p.Notes || "—") + '</td>'
        + '<td style="white-space:nowrap;"><button class="btn btn-sm btn-ghost" onclick="openPaymentEditor(\'' + p.ID + '\')">Edit</button>'
        + '<button class="btn btn-sm btn-ghost btn-danger" onclick="deletePayment(\'' + p.ID + '\')">Del</button></td>'
        + '</tr>';
    });
    html += '</tbody></table></div></div>';
  }
  html += '</div></div>';

  document.getElementById("mainContent").innerHTML = html;
}

function toggleSection(id) {
  var el = document.getElementById(id);
  var arrow = document.getElementById(id + "Arrow");
  if (!el) return;
  if (el.style.display === "none") {
    el.style.display = "block";
    if (arrow) arrow.innerHTML = "&#9660;";
  } else {
    el.style.display = "none";
    if (arrow) arrow.innerHTML = "&#9654;";
  }
}

// ---- PAYMENT EDITOR MODAL ----
function openPaymentEditor(payId, jobId) {
  var pay = payId ? S.payments.find(function(p) { return p.ID === payId; }) : null;
  var isNew = !pay;
  if (!isNew && !jobId) jobId = pay.JobID;
  var job = jobId ? S.jobs.find(function(j) { return j.ID === jobId; }) : null;

  if (isNew) {
    pay = {
      ID: "", JobID: jobId || "", JobName: job ? (job.JobName || job.ClientName) : "",
      ClientName: job ? job.ClientName : "",
      DateReceived: new Date().toISOString().split("T")[0],
      Type: "Deposit", GrossAmount: "", Fees: "", NetAmount: "",
      Method: "", Notes: ""
    };
  }

  var payMethods = getSetting("paymentMethods", ["Zelle", "GoDaddy", "Venmo", "PayPal", "Cash App", "Cash", "Check"]);
  var payTypes = ["Deposit", "Partial", "Final Payment"];

  var html = '<div class="modal-overlay" onclick="if(event.target===this)closeModal()"><div class="modal"><h3>' + (isNew ? "Log payment" : "Edit payment") + '</h3>';

  html += '<div class="form-group"><label class="form-label">Job</label>'
    + '<select class="form-select" id="pJobID">';
  if (!pay.JobID) html += '<option value="">— Select job —</option>';
  S.jobs.forEach(function(j) {
    var label = (j.JobName || j.ClientName || "—") + (j.ClientName && j.JobName ? " (" + j.ClientName + ")" : "");
    html += '<option value="' + j.ID + '"' + (pay.JobID === j.ID ? " selected" : "") + '>' + label + '</option>';
  });
  html += '</select></div>';

  html += '<div class="form-row"><div class="form-group"><label class="form-label">Date received</label>'
    + '<input class="form-input" type="date" id="pDate" value="' + (pay.DateReceived || "") + '"></div>'
    + '<div class="form-group"><label class="form-label">Payment type</label>'
    + '<select class="form-select" id="pType">';
  payTypes.forEach(function(t) { html += '<option' + (pay.Type === t ? " selected" : "") + '>' + t + '</option>'; });
  html += '</select></div></div>';

  html += '<div class="form-row-3"><div class="form-group"><label class="form-label">Gross amount</label>'
    + '<input class="form-input" type="number" step="0.01" id="pGross" value="' + (pay.GrossAmount || "") + '" onchange="calcPayNet()"></div>'
    + '<div class="form-group"><label class="form-label">Processing fees</label>'
    + '<input class="form-input" type="number" step="0.01" id="pFees" value="' + (pay.Fees || "") + '" onchange="calcPayNet()"></div>'
    + '<div class="form-group"><label class="form-label">Net received</label>'
    + '<input class="form-input" type="number" step="0.01" id="pNet" value="' + (pay.NetAmount || "") + '" style="font-weight:600;color:var(--green-fg);"></div></div>';

  html += '<div class="form-group"><label class="form-label">Payment method</label>'
    + '<select class="form-select" id="pMethod"><option value="">—</option>';
  payMethods.forEach(function(m) { html += '<option' + (pay.Method === m ? " selected" : "") + '>' + m + '</option>'; });
  html += '</select></div>';

  html += '<div class="form-group"><label class="form-label">Notes</label>'
    + '<textarea class="form-textarea" id="pNotes" rows="2">' + (pay.Notes || "") + '</textarea></div>';

  html += '<input type="hidden" id="pID" value="' + (pay.ID || "") + '">';
  html += '<div class="modal-actions">';
  if (!isNew) html += '<button class="btn btn-danger" onclick="deletePayment(\'' + pay.ID + '\');closeModal()" style="margin-right:auto;">Delete payment</button>';
  html += '<button class="btn" onclick="closeModal()">Cancel</button>'
    + '<button class="btn btn-accent" onclick="savePayment()">Save payment</button></div>';
  html += '</div></div>';

  document.body.insertAdjacentHTML("beforeend", html);
}

function calcPayNet() {
  var gross = parseFloat(document.getElementById("pGross").value) || 0;
  var fees = parseFloat(document.getElementById("pFees").value) || 0;
  document.getElementById("pNet").value = Math.round((gross - fees) * 100) / 100;
}

function paymentJobChanged() {
  // Auto-fill job info when job is selected
  var jobId = document.getElementById("pJobID").value;
  // No other auto-fill needed, job name pulled on save
}

async function savePayment() {
  var jobId = document.getElementById("pJobID").value;
  var job = jobId ? S.jobs.find(function(j) { return j.ID === jobId; }) : null;

  var pay = {
    ID: document.getElementById("pID").value,
    JobID: jobId,
    JobName: job ? (job.JobName || job.ClientName || "") : "",
    ClientName: job ? (job.ClientName || "") : "",
    DateReceived: document.getElementById("pDate").value,
    Type: document.getElementById("pType").value,
    GrossAmount: document.getElementById("pGross").value,
    Fees: document.getElementById("pFees").value,
    NetAmount: document.getElementById("pNet").value,
    Method: document.getElementById("pMethod").value,
    Notes: document.getElementById("pNotes").value
  };

  closeModal();

  if (pay.ID) {
    var idx = S.payments.findIndex(function(p) { return p.ID === pay.ID; });
    if (idx >= 0) S.payments[idx] = pay;
  } else {
    pay.ID = "pay" + Date.now() + Math.floor(Math.random()*10000);
    S.payments.push(pay);
  }
  render();
  toast("Payment saved");

  var result = await apiWrite({ action: "savePayment", payment: pay });
  if (!result.success) toast("Sync failed", true);
}

async function deletePayment(id) {
  if (!confirm("Delete this payment record?")) return;
  S.payments = S.payments.filter(function(p) { return p.ID !== id; });
  render();
  toast("Payment deleted");
  var result = await apiWrite({ action: "deletePayment", id: id });
  if (!result.success) toast("Sync failed", true);
}

function resolvePayment(jobId) {
  var html = '<div class="modal-overlay" onclick="if(event.target===this)closeModal()"><div class="modal" style="max-width:440px;">'
    + '<h3>Mark payment resolved</h3>'
    + '<div class="form-group"><label class="form-label">Reason</label>'
    + '<select class="form-select" id="resolveReason">'
    + '<option>Discount given</option><option>Write-off</option><option>Pro bono</option>'
    + '<option>Client dispute</option><option>Partial trade</option><option>Other</option>'
    + '</select></div>'
    + '<div class="form-group"><label class="form-label">Notes (optional)</label>'
    + '<input class="form-input" id="resolveNotes" placeholder="Any details..."></div>'
    + '<div class="modal-actions"><button class="btn" onclick="closeModal()">Cancel</button>'
    + '<button class="btn btn-accent" onclick="confirmResolve(\'' + jobId + '\')">Resolve</button></div>'
    + '</div></div>';
  document.body.insertAdjacentHTML("beforeend", html);
}

async function confirmResolve(jobId) {
  var reason = document.getElementById("resolveReason").value;
  var notes = document.getElementById("resolveNotes").value;
  if (notes) reason += " — " + notes;
  closeModal();
  var job = S.jobs.find(function(j) { return j.ID === jobId; });
  if (!job) return;
  job.PaymentResolved = true;
  job.ResolvedReason = reason;
  render();
  toast("Payment marked as resolved");
  var result = await apiWrite({ action: "saveJob", job: job });
  if (!result.success) toast("Sync failed", true);
}

async function unresolvePayment(jobId) {
  var job = S.jobs.find(function(j) { return j.ID === jobId; });
  if (!job) return;
  job.PaymentResolved = false;
  job.ResolvedReason = "";
  render();
  toast("Payment reopened");
  var result = await apiWrite({ action: "saveJob", job: job });
  if (!result.success) toast("Sync failed", true);
}

// ---- PIPELINE UPDATE ----
// Each stage is independent. Click to cycle: pending → current (yellow) → done (green) → na (purple) → pending
// PipelineData stores per-stage state: { "Lead": "done", "Contracted": "current", "Shot": "na" }

var PIPE_CYCLE = ["pending", "current", "done", "na"];

function getPipeStates(job) {
  var states = {};
  try { states = typeof job.PipelineData === "object" ? job.PipelineData : JSON.parse(job.PipelineData || "{}"); } catch(e) {}
  // If empty, derive from legacy PipelineStatus
  var stages = pipelineStages();
  var hasAny = false;
  stages.forEach(function(s) { if (states[s]) hasAny = true; });
  if (!hasAny && job.PipelineStatus) {
    var pIdx = pipelineIndex(job.PipelineStatus);
    stages.forEach(function(s, i) {
      states[s] = i < pIdx ? "done" : i === pIdx ? "current" : "pending";
    });
  }
  return states;
}

function getPipeDisplay(job, stageIdx) {
  var states = getPipeStates(job);
  var stages = pipelineStages();
  return states[stages[stageIdx]] || "pending";
}

function getPipeLabel(job) {
  var states = getPipeStates(job);
  var stages = pipelineStages();
  // Show summary: count of each state
  var inProg = 0, done = 0;
  stages.forEach(function(s) {
    if (states[s] === "current") inProg++;
    if (states[s] === "done") done++;
  });
  if (inProg > 0) return inProg + " in progress";
  if (done === stages.length) return "Complete";
  if (done > 0) return done + "/" + stages.length;
  return "Not started";
}

async function updatePipeline(jobId, stageIdx) {
  var job = S.jobs.find(function(j) { return j.ID === jobId; });
  if (!job) return;
  var stages = pipelineStages();
  if (stageIdx < 0 || stageIdx >= stages.length) return;

  var states = getPipeStates(job);
  var stage = stages[stageIdx];
  var current = states[stage] || "pending";

  // Cycle to next state
  var cycleIdx = PIPE_CYCLE.indexOf(current);
  var next = PIPE_CYCLE[(cycleIdx + 1) % PIPE_CYCLE.length];
  states[stage] = next;

  job.PipelineData = states;
  // Update PipelineStatus for backward compat
  var labels = { pending: "Pending", current: "In Progress", done: "Done", na: "N/A" };
  job.PipelineStatus = stages[stageIdx] + " — " + labels[next];

  render();
  var stateLabels = { pending: "pending", current: "in progress", done: "complete", na: "N/A" };
  toast(stage + " → " + stateLabels[next]);
  var result = await apiWrite({ action: "saveJob", job: job });
  if (!result.success) toast("Sync failed", true);
}

  row.innerHTML = '<input class="form-input" placeholder="Description" style="flex:2;min-width:0;">'
    + '<input class="form-input" type="number" step="0.01" placeholder="Amount" value="0" style="flex:1;min-width:0;max-width:120px;" onchange="calcInvTotal()">'
    + '<button class="btn btn-sm btn-danger" onclick="this.parentElement.remove();calcInvTotal()" style="flex-shrink:0;">&times;</button>';

}

function calcInvTotal() {
  var rows = document.querySelectorAll("#costItems .cost-row");
  var subtotal = 0;
  rows.forEach(function(row) {
    var inputs = row.querySelectorAll("input");
    subtotal += parseFloat(inputs[1].value) || 0;
  });
  var tax = parseFloat(document.getElementById("iSalesTax").value) || 0;
  var deposit = parseFloat(document.getElementById("iDeposit").value) || 0;
  document.getElementById("iTotalDue").value = Math.round((subtotal + tax - deposit) * 100) / 100;
}

async function saveInvoice() {
  var rows = document.querySelectorAll("#costItems .cost-row");
  var costBreakdown = [];
  rows.forEach(function(row) {
    var inputs = row.querySelectorAll("input");
    if (inputs[0].value || parseFloat(inputs[1].value)) {
      costBreakdown.push({ desc: inputs[0].value, amount: parseFloat(inputs[1].value) || 0 });
    }
  });

  var inv = {
    ID: document.getElementById("iID").value,
    InvoiceNumber: document.getElementById("iNumber").value,
    JobID: document.getElementById("iJobID").value,
    ClientName: document.getElementById("iClient").value,
    BillToAddress: document.getElementById("iBillTo").value,
    DateOfService: document.getElementById("iDateService").value,
    DateFiled: document.getElementById("iDateFiled").value,
    ServiceProvided: document.getElementById("iService").value,
    Project: document.getElementById("iProject").value,
    CostBreakdown: costBreakdown,
    SalesTax: document.getElementById("iSalesTax").value,
    Deposit: document.getElementById("iDeposit").value,
    TotalDue: document.getElementById("iTotalDue").value,
    PaymentTerms: document.getElementById("iTerms").value,
    Status: document.getElementById("iStatus").value,
    Notes: document.getElementById("iNotes").value
  };

  closeModal();

  if (inv.ID) {
    var idx = S.invoices.findIndex(function(i) { return i.ID === inv.ID; });
    if (idx >= 0) S.invoices[idx] = inv;
  } else {
    inv.ID = "inv" + Date.now() + Math.floor(Math.random()*10000);
    S.invoices.push(inv);
    S.nextInvoiceNum = parseInt(inv.InvoiceNumber) + 1;
  }
  render();
  toast("Invoice saved");

  var result = await apiWrite({ action: "saveInvoice", invoice: inv });
  if (!result.success) toast("Sync failed", true);

}

// ---- SETTINGS ACTIONS ----
function addSettingItem(key) {
  var html = '<div class="modal-overlay" onclick="if(event.target===this)closeModal()"><div class="modal" style="max-width:400px;">'
    + '<h3>Add item</h3>'
    + '<div class="form-group"><label class="form-label">' + key + '</label>'
    + '<input class="form-input" id="settingNewVal" placeholder="Enter new value..." autofocus></div>'
    + '<div class="modal-actions"><button class="btn" onclick="closeModal()">Cancel</button>'
    + '<button class="btn btn-accent" onclick="confirmAddSetting(\'' + key + '\')">Add</button></div>'
    + '</div></div>';
  document.body.insertAdjacentHTML("beforeend", html);
  setTimeout(function() { var el = document.getElementById("settingNewVal"); if (el) el.focus(); }, 100);
}

function confirmAddSetting(key) {
  var val = document.getElementById("settingNewVal").value.trim();
  closeModal();
  if (!val) return;
  var items = getSetting(key, []);
  items.unshift(val);
  S.settings[key] = items;
  render();
  apiWrite({ action: "saveSetting", key: key, value: items });
}

function removeSettingItem(key, idx) {
  var items = getSetting(key, []);
  if (!confirm("Remove '" + items[idx] + "'?")) return;
  items.splice(idx, 1);
  S.settings[key] = items;
  render();
  apiWrite({ action: "saveSetting", key: key, value: items });
}

function moveSettingItem(key, idx, dir) {
  var items = getSetting(key, []);
  var newIdx = idx + dir;
  if (newIdx < 0 || newIdx >= items.length) return;
  var temp = items[idx];
  items[idx] = items[newIdx];
  items[newIdx] = temp;
  S.settings[key] = items;
  render();
  apiWrite({ action: "saveSetting", key: key, value: items });
}

function updateApiUrl() {
  var url = document.getElementById("apiUrlInput").value.trim();
  if (url) {
    API_URL = url;
    localStorage.setItem("jppf_api_url", url);
    toast("API URL updated. Reloading...");
    setTimeout(function() { location.reload(); }, 1000);
  }
}

// ---- NAVIGATION ----
function navigate(view) {
  S.view = view;
  S.viewingJob = null;
  S.viewingInvoice = null;
  S.viewingContract = null;
  render();
}

function openJobDetail(id) {
  S.view = "jobDetail";
  S.viewingJob = id;
  render();
}

function viewInvoice(id) {
  S.view = "invoiceViewer";
  S.viewingInvoice = id;
  render();
}

function viewContract(id) {
  S.view = "contractViewer";
  S.viewingContract = id;
  render();
}

function setFilter(val, type) {
  if (type === "quarter") {
    S.filterQuarter = val;
    S.filter = "all";
  } else {
    S.filter = S.filter === "action" ? "all" : "action";
  }
  render();
}

function closeModal() {
  var overlay = document.querySelector(".modal-overlay");
  if (overlay) overlay.remove();
}

// ---- MAIN RENDER ----
function render() {
  renderSidebar();
  switch (S.view) {
    case "dashboard": renderDashboard(); break;
    case "payments": renderPayments(); break;
    case "jobDetail": renderJobDetail(S.viewingJob); break;
    case "invoiceViewer": renderInvoiceViewer(S.viewingInvoice); break;
    case "contractViewer": renderContractViewer(S.viewingContract); break;
    case "expenses": renderExpenses(); break;
    case "settings": renderSettings(); break;
    default: renderDashboard();
  }
}
